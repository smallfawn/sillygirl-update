name: Go

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # 建议：打标签时也触发，方便管理版本
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build and Compress
      run: |
        n=$(date +%s%3N)
        
        # 写入编译时间
        mkdir -p core
        echo "package core" > core/compile_time.go
        echo "var compiled_at = \"$n\"" >> core/compile_time.go
        
        # 编译
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o sillyGirl_windows_amd64.exe
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o sillyGirl_linux_arm64
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o sillyGirl_linux_amd64
        
        # UPX 压缩
        sudo apt-get install upx-ucl
        upx sillyGirl_linux_arm64
        upx sillyGirl_linux_amd64
        upx sillyGirl_windows_amd64.exe
        
        # 优化后的 Webhook 触发：增加 --timeout 并在失败时不报错退出
        if [ -n "${{ secrets.VERSION }}" ]; then
          wget -q -T 10 -O - "${{ secrets.VERSION }}$n" || echo "Webhook notification failed, but continuing..."
        fi



    - name: Upload to Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: sillyGirl_*
        file_glob: true
        tag: latest              # 固定的标签名
        release_name: "最新编译版本" # 显式指定 Release 的标题
        overwrite: true          # 每次运行都覆盖旧文件
        body: "自动编译于: ${{ github.event.head_commit.timestamp }}"